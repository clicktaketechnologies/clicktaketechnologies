# Cloudflare Worker — Media CDN Failover Router
#
# Deploy:
#   cd workers/cloudflare
#   npx wrangler deploy
#
# Required env vars (set via `wrangler secret put` or dashboard):
#   MEDIA_CONFIG  JSON string with provider chain (see example below)
#
# Required bindings:
#   R2_BUCKET         R2 bucket used as last-resort fallback (media-failover-fallback)
#   MEDIA_CONFIG_KV   Optional KV namespace for hot-reloadable provider chain

name = "media-failover"
main = "media-failover-router.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

# Route: bind media.clicktaketech.com to this worker (configure in dashboard
# or uncomment + edit after the worker is deployed).
# routes = [
#   { pattern = "media.clicktaketech.com/*", zone_name = "clicktaketech.com" }
# ]

# R2 bucket as last-resort fallback when every CDN origin is unreachable.
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "media-failover-fallback"
preview_bucket_name = "media-failover-fallback-preview"

# Optional KV namespace — lets you update the provider chain without redeploying.
[[kv_namespaces]]
binding = "MEDIA_CONFIG_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# Default provider chain (overridable via KV at runtime).
# Edit this JSON to match your active CDN providers (priority: lower = tried first).
[vars]
MEDIA_CONFIG = """
{
  "providers": [
    {
      "id": "cloudflare",
      "priority": 1,
      "baseUrl": "https://imagedelivery.net"
    },
    {
      "id": "cloudinary",
      "priority": 2,
      "baseUrl": "https://res.cloudinary.com/<your-cloud>/image/fetch"
    },
    {
      "id": "imagekit",
      "priority": 3,
      "baseUrl": "https://ik.imagekit.io/<your-id>"
    },
    {
      "id": "uploadcare",
      "priority": 4,
      "baseUrl": "https://ucarecdn.com"
    },
    {
      "id": "twicpics",
      "priority": 5,
      "baseUrl": "https://<your-sub>.twic.pics"
    }
  ],
  "fallbackTtl": 3600
}
"""

# Observability — enable logs + analytics
[observability]
enabled = true

# Smart placement — run the worker close to the origin (Cloudflare Images / R2)
# when those are the dominant backends.
[placement]
mode = "smart"
